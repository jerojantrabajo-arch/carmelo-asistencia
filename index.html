<script>
// ══════════════════════════════════════
//  CONFIGURACION
// ══════════════════════════════════════
var FORM_ID   = "1FAIpQLSdziUIaNrpGb3aS4XE9O-JaiJQRZ6yUniuDxxM0vz5zISI70g";
var ENTRY_ID  = "entry.582603348";
var ENTRY_MOT = "entry.1889062583";
var FORM_URL  = "https://docs.google.com/forms/d/e/"+FORM_ID+"/formResponse";
var AS_URL    = "https://script.google.com/macros/s/AKfycbyBfPfJ7ZWErR18qk4i2DGX9ucihqLGElcFmaB5dAtFYuhpgLxOm1BmP5tF1bh44wGq4A/exec";

// ══════════════════════════════════════
//  ESTADO
// ══════════════════════════════════════
var pinVerificado = false;
var PIN_SESION    = "pin_sesion_" + new Date().toLocaleDateString("es-PE");
var pinVerificado = false;
var PIN_SESION    = "pin_sesion_" + new Date().toLocaleDateString("es-PE");
var procesando = false;
var bloqueados = {}; // id -> timestamp ultimo scan
var registros  = {}; // id -> {e:0, s:0, fecha:""}
var historial  = [];
var cE=0, cS=0, cD=0;

// Cargar registros del localStorage para persistir entre recargas
function cargarRegistros() {
  try {
    var hoy = fechaHoy();
    var data = localStorage.getItem("registros_" + hoy);
    if (data) registros = JSON.parse(data);
  } catch(e) {}
}

function guardarRegistros() {
  try {
    localStorage.setItem("registros_" + fechaHoy(), JSON.stringify(registros));
  } catch(e) {}
}
  
function verificarTiempoMinimo(id) {
  try {
    var key  = "entrada_ts_" + id + "_" + fechaHoy();
    var ts   = localStorage.getItem(key);
    if (!ts) return 999;
    var diff = (Date.now() - parseInt(ts)) / 60000;
    return Math.floor(diff);
  } catch(e) { return 999; }
}
  
function fechaHoy() {
  return new Date().toLocaleDateString("es-PE");
}

function getRegistro(id) {
  var hoy = fechaHoy();
  if (!registros[id] || registros[id].fecha !== hoy) {
    registros[id] = {e:0, s:0, fecha:hoy};
  }
  return registros[id];
}

// ══════════════════════════════════════
//  INIT
// ══════════════════════════════════════
window.onload = function() {
  limpiarSiDiaAnterior();
  cargarRegistros();
  verificarSesionPin();
};

function obtenerIdDeURL() {
  var params = new URLSearchParams(window.location.search);
  return params.get("id") ? params.get("id").trim().toUpperCase() : null;
}

function verificarSesionPin() {
  try {
    var sesion = localStorage.getItem(PIN_SESION);
    if (sesion === "OK") {
      pinVerificado = true;
      iniciarCamara();
      document.getElementById("input-id").focus();
      return;
    }
  } catch(e) {}
  mostrarPantallaPin();
}

function mostrarPantallaPin() {
  document.body.innerHTML =
    '<div style="background:#7B3F00;min-height:100vh;display:flex;align-items:center;' +
    'justify-content:center;font-family:Arial">' +
    '<div style="background:#FFF8F0;border-radius:16px;padding:32px;width:320px;' +
    'text-align:center;border:3px solid #D2691E">' +
    '<div style="font-size:48px;margin-bottom:16px">ECM</div>' +
    '<h1 style="color:#7B3F00;font-size:20px;margin-bottom:8px">Sistema de Asistencia</h1>' +
    '<p style="color:#C68642;font-size:14px;margin-bottom:24px">I.E. El Carmelo de María</p>' +
    '<p style="color:#3A1800;font-size:15px;margin-bottom:16px;font-weight:bold">' +
    'Ingrese el PIN del día</p>' +
    '<input id="pin-input" type="password" inputmode="numeric" maxlength="4" ' +
    'style="width:100%;padding:14px;font-size:28px;text-align:center;' +
    'border:2px solid #C68642;border-radius:8px;letter-spacing:12px;' +
    'margin-bottom:16px;font-family:Arial" placeholder="----" ' +
    'onkeydown="if(event.key===\'Enter\')validarPin()">' +
    '<button onclick="validarPin()" ' +
    'style="width:100%;padding:14px;background:#7B3F00;color:white;border:none;' +
    'border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:12px">' +
    'Ingresar</button>' +
    '<div id="pin-error" style="color:#9B1C1C;font-size:14px;min-height:20px"></div>' +
    '<p style="color:#C68642;font-size:12px;margin-top:16px">' +
    'Solicite el PIN al responsable del sistema</p>' +
    '</div></div>';
  setTimeout(function() {
    var inp = document.getElementById("pin-input");
    if (inp) inp.focus();

}

function validarPin() {
  var pinIngresado = document.getElementById("pin-input").value.trim();
  if (!pinIngresado || pinIngresado.length < 4) {
    document.getElementById("pin-error").textContent = "Ingrese los 4 dígitos del PIN";
    return;
  }
  document.getElementById("pin-error").textContent = "Verificando...";
  fetch(AS_URL + "?accion=pin&valor=" + encodeURIComponent(pinIngresado))

        try { localStorage.setItem(PIN_SESION, "OK"); } catch(e) {}

        location.reload();
      } else {
        document.getElementById("pin-error").textContent = "PIN incorrecto. Intente nuevamente.";
        document.getElementById("pin-input").value = "";
        document.getElementById("pin-input").focus();
      }
    })
    .catch(function() {
      document.getElementById("pin-error").textContent = "Sin conexion. Intente nuevamente.";
    });
}

function verificarSesionPin() {
  try {
    var sesion = localStorage.getItem(PIN_SESION);
    if (sesion === "OK") {
      pinVerificado = true;
      iniciarCamara();
      document.getElementById("input-id").focus();
      return;
    }
  } catch(e) {}
  mostrarPantallaPin();
}

function mostrarPantallaPin() {
  document.body.innerHTML =
    '<div style="background:#7B3F00;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:Arial">' +
    '<div style="background:#FFF8F0;border-radius:16px;padding:32px;width:320px;text-align:center;border:3px solid #D2691E">' +
    '<div style="font-size:48px;margin-bottom:16px">🔒</div>' +
    '<h1 style="color:#7B3F00;font-size:20px;margin-bottom:8px">Sistema de Asistencia</h1>' +
    '<p style="color:#C68642;font-size:14px;margin-bottom:24px">I.E. El Carmelo de María</p>' +
    '<p style="color:#3A1800;font-size:15px;margin-bottom:16px;font-weight:bold">Ingrese el PIN del día</p>' +
    '<input id="pin-input" type="password" inputmode="numeric" maxlength="4" ' +
    'style="width:100%;padding:14px;font-size:28px;text-align:center;border:2px solid #C68642;border-radius:8px;letter-spacing:12px;margin-bottom:16px;font-family:Arial" ' +
    'placeholder="••••" onkeydown="if(event.key===\'Enter\')validarPin()">' +
    '<button onclick="validarPin()" ' +
    'style="width:100%;padding:14px;background:#7B3F00;color:white;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:12px">' +
    'Ingresar</button>' +
    '<div id="pin-error" style="color:#9B1C1C;font-size:14px;min-height:20px"></div>' +
    '<p style="color:#C68642;font-size:12px;margin-top:16px">Solicite el PIN al responsable del sistema</p>' +
    '</div></div>';
}

function validarPin() {
  var pinIngresado = document.getElementById("pin-input").value.trim();
  if (!pinIngresado || pinIngresado.length < 4) {
    document.getElementById("pin-error").textContent = "Ingrese los 4 dígitos del PIN";
    return;
  }

  document.getElementById("pin-error").textContent = "Verificando...";

  fetch(AS_URL + "?accion=pin&valor=" + encodeURIComponent(pinIngresado))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.valido) {
        try { localStorage.setItem(PIN_SESION, "OK"); } catch(e) {}
        pinVerificado = true;
        // Recargar la pagina para mostrar el kiosco
        location.reload();
      } else {
        document.getElementById("pin-error").textContent = "PIN incorrecto. Intente nuevamente.";
        document.getElementById("pin-input").value = "";
        document.getElementById("pin-input").focus();
      }
    })
    .catch(function() {

function limpiarSiDiaAnterior() {
  try {
    var ultimoDia = localStorage.getItem("ultimo_dia");
    var hoy = fechaHoy();
    if (ultimoDia !== hoy) {
      // Es un dia nuevo — limpiar todos los registros locales
      localStorage.clear();
      localStorage.setItem("ultimo_dia", hoy);
    }
  } catch(e) {}
}

// ══════════════════════════════════════
//  CAMARA
// ══════════════════════════════════════
var videoStream  = null;
var camaraActiva = false;
var scanInterval = null;

function iniciarCamara() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    document.getElementById("cam-msg").textContent = "Camara no disponible — usar ingreso manual";
    document.getElementById("btn-cam").style.display = "none";
    return;
  }
  navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment", width:{ideal:1280}, height:{ideal:720}}
  }).then(function(s) {
    videoStream = s;
    var v = document.getElementById("video");
    v.srcObject = s;
    v.play();
    camaraActiva = true;
    document.getElementById("cam-msg").textContent = "Encuadre el QR en el recuadro naranja";
    scanInterval = setInterval(escanearFrame, 50);
        // Si la URL trae un ID procesarlo automaticamente
    var idURL = obtenerIdDeURL();
    if (idURL) {
      setTimeout(function() {
        procesarId(idURL);
        window.history.replaceState({}, document.title, window.location.pathname);
      }, 500);
    }
  }).catch(function() {
    document.getElementById("cam-msg").textContent = "Sin acceso a camara — usar ingreso manual";
    document.getElementById("btn-cam").style.display = "none";
  });
}

function escanearFrame() {
  if (procesando) return;
  var v = document.getElementById("video");
  var c = document.getElementById("canvas-qr");
  if (!v.readyState || v.readyState < 2 || !v.videoWidth) return;

  var vw = v.videoWidth;
  var vh = v.videoHeight;

  // Procesar solo la region central (donde esta el recuadro naranja)
  var tam  = Math.min(vw, vh) * 0.9;
  var sx   = (vw - tam) / 2;
  var sy   = (vh - tam) / 2;

  c.width  = tam;
  c.height = tam;

  var ctx = c.getContext("2d", {willReadFrequently:true});
  ctx.drawImage(v, sx, sy, tam, tam, 0, 0, tam, tam);

  var img  = ctx.getImageData(0, 0, tam, tam);
  var code = jsQR(img.data, img.width, img.height, {inversionAttempts:"dontInvert"});
  if (code && code.data) {
    var id = extraerID(code.data);
    if (id) procesarId(id);
  }
}

function extraerID(url) {
  // Formato nuevo: https://jerojantrabajo.github.io/carmelo-asistencia/?id=XXXXX
  var mNuevo = url.match(/[?&]id=([^&]+)/);
  if (mNuevo) return decodeURIComponent(mNuevo[1]).trim().toUpperCase();

  // Formato antiguo (compatibilidad): entry.582603348=XXXXX
  var mAntiguo = url.match(/entry\.582603348=([^&]+)/);
  if (mAntiguo) return decodeURIComponent(mAntiguo[1]).trim().toUpperCase();

  // Solo numeros (lector externo)
  if (/^\d{5,12}$/.test(url.trim())) return url.trim().toUpperCase();

  return null;
}

function toggleCamara() {
  if (camaraActiva) {
    clearInterval(scanInterval);
    if (videoStream) videoStream.getTracks().forEach(function(t){t.stop();});
    camaraActiva = false;
    document.getElementById("btn-cam").textContent = "Activar camara";
    document.getElementById("cam-msg").textContent  = "Camara pausada";
  } else {
    iniciarCamara();
  }
}

// ══════════════════════════════════════
//  INGRESO MANUAL
// ══════════════════════════════════════
function procesarManual() {
  var id = document.getElementById("input-id").value.trim().toUpperCase();
  if (!id) return;
  document.getElementById("input-id").value = "";
  procesarId(id);
}

// ══════════════════════════════════════
//  LOGICA PRINCIPAL
// ══════════════════════════════════════
function procesarId(id) {
  var ahora = Date.now();

  // Anti-duplicado por tiempo: mismo ID en menos de 8 segundos
  if (bloqueados[id] && (ahora - bloqueados[id]) < 8000) return;
  if (procesando) return;

  procesando    = true;
  bloqueados[id] = ahora;

  var reg = getRegistro(id);

  // CAPA 1: verificacion local inmediata
  // Si ya tiene 1 entrada y 1 salida localmente — BLOQUEAR
  if (reg.e >= 1 && reg.s >= 1) {
    mostrarDuplicado(id);
    return;
  }

  // Determinar tipo esperado segun registro local
  var tipoEsperado = (reg.e === 0) ? "ENTRADA" : "SALIDA";

  mostrarEstado("procesando", "...", "Verificando " + id, "Consultando el sistema...");

  // CAPA 2: verificar en Apps Script (si esta disponible)
  var urlConsulta = AS_URL + "?accion=estado&id=" + encodeURIComponent(id);

  fetch(urlConsulta, {signal: AbortSignal.timeout ? AbortSignal.timeout(4000) : undefined})
    .then(function(r) { return r.json(); })
    .then(function(data) {
      // Sincronizar estado local con el del servidor
      if (data.estado === "COMPLETO") {
        reg.e = 1; reg.s = 1;
        guardarRegistros();
        mostrarDuplicado(id, data.nombre);
        return;
      }
      if (data.estado === "TIENE_ENTRADA") {
    reg.e = Math.max(reg.e, 1);
    guardarRegistros();
    tipoEsperado = "SALIDA";
  }
  // Verificar tiempo minimo antes de registrar salida
  if (tipoEsperado === "SALIDA") {
    var minutos = verificarTiempoMinimo(id);
    if (minutos < 30) {
      mostrarEstado("duplicado", "=",
        "Muy pronto para salida",
        "Faltan " + (30 - minutos) + " min para poder registrar salida");
      setTimeout(function(){ resetear(); procesando=false; document.getElementById("input-id").focus(); }, 3000);
      return;
    }
  }
  enviar(id, data.nombre || id, data.grado || "", tipoEsperado);
    })
    .catch(function() {
      // Sin conexion a AS — usar solo estado local
    if (tipoEsperado === "SALIDA") {
      var minLocal = verificarTiempoMinimo(id);
      if (minLocal < 30) {
        mostrarEstado("duplicado", "=",
          "Muy pronto para salida",
          "Faltan " + (30 - minLocal) + " min para poder registrar salida");
        setTimeout(function(){ resetear(); procesando=false; document.getElementById("input-id").focus(); }, 3000);
        return;
      }
    }
    enviar(id, id, "", tipoEsperado);
    });
}

function enviar(id, nombre, grado, tipo) {
  mostrarEstado("procesando", "...", tipo + ": " + nombre, "Registrando en el sistema...");

  var body = ENTRY_ID + "=" + encodeURIComponent(id) + "&" + ENTRY_MOT + "=NORMAL";

  fetch(FORM_URL, {
    method:"POST", mode:"no-cors",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:body
  }).then(function() {
    var reg  = getRegistro(id);
    var hora = new Date().toLocaleTimeString("es-PE",{hour:"2-digit",minute:"2-digit"});

    if (tipo === "ENTRADA") {
      reg.e++;
      // Guardar timestamp de la entrada para calcular tiempo minimo de salida
      try {
        localStorage.setItem("entrada_ts_" + id + "_" + fechaHoy(), Date.now().toString());
      } catch(e) {}
      cE++; document.getElementById("c-e").textContent = cE;
      mostrarEstado("entrada", "->", "ENTRADA: " + nombre, hora);
    } else {
      reg.s++;
      cS++; document.getElementById("c-s").textContent = cS;
      mostrarEstado("salida", "<-", "SALIDA: " + nombre, hora);
    }
    guardarRegistros();
    agregarHistorial(nombre||id, tipo, hora);

    setTimeout(function() {
      resetear();
      procesando = false;
      document.getElementById("input-id").focus();
    }, 2500);

  }).catch(function() {
    mostrarEstado("error","!","Error de conexion","Verifique el internet e intente");
    setTimeout(function(){ resetear(); procesando=false; }, 3000);
  });
}

function mostrarDuplicado(id, nombre) {
  cD++; document.getElementById("c-d").textContent = cD;
  mostrarEstado("duplicado","=","Ya registrado hoy", (nombre||id)+" ya tiene entrada y salida");
  agregarHistorial(nombre||id, "DUPLICADO", new Date().toLocaleTimeString("es-PE",{hour:"2-digit",minute:"2-digit"}));
  setTimeout(function(){ resetear(); procesando=false; document.getElementById("input-id").focus(); }, 2500);
}

//  UI

function mostrarEstado(cls, icono, titulo, sub) {
  document.getElementById("estado-card").className = "estado-card " + cls;
  document.getElementById("e-icono").textContent   = icono;
  document.getElementById("e-titulo").textContent  = titulo;
  document.getElementById("e-sub").textContent     = sub;
}

function resetear() {
  mostrarEstado("esperando","[ ]","Listo para escanear","Acerque el codigo QR del alumno");
}

function agregarHistorial(nombre, tipo, hora) {
  historial.unshift({nombre:nombre, tipo:tipo, hora:hora});
  if (historial.length > 30) historial.pop();
  var cls = tipo==="ENTRADA"?"b-entrada":tipo==="SALIDA"?"b-salida":"b-duplic";
  var html = historial.map(function(r){
    var c = r.tipo==="ENTRADA"?"b-entrada":r.tipo==="SALIDA"?"b-salida":"b-duplic";
    return '<div class="h-item">'+
      '<span class="h-nombre">'+r.nombre+'</span>'+
      '<span class="h-hora">'+r.hora+'</span>'+
      '<span class="h-badge '+c+'">'+r.tipo+'</span></div>';
  }).join("");
  document.getElementById("lista-historial").innerHTML = html;
}

function limpiarTodo() {
  historial=[]; cE=0; cS=0; cD=0;
  registros={};
  guardarRegistros();
  document.getElementById("c-e").textContent=0;
  document.getElementById("c-s").textContent=0;
  document.getElementById("c-d").textContent=0;
  document.getElementById("lista-historial").innerHTML='<div class="h-vacio">Sin registros aun</div>';
}
</script>
